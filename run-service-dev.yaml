apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: synthsentry-web-dev
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/execution-environment: gen2
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
    spec:
      containers:
        - image: synthsentry-web
          ports:
            - containerPort: 8080
          env:
            - name: NODE_ENV
              value: development