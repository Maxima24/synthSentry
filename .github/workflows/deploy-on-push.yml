name: Deploy on Push

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1078562117787/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@synthsentry.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Submit Cloud Build deployment
        run: |
          gcloud config set project synthsentry
          gcloud beta builds submit --config=cloudbuild.yaml --project=synthsentry
